<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Reset - Manake</title>
    <script>
        // Clear all caches and reload homepage
        if ('caches' in window) {
            caches.keys().then(function(names) {
                names.forEach(function(name) {
                    caches.delete(name);
                });
            });
        }
        
        // Force reload to homepage
        window.location.href = '/';
    </script>
</head>
<body>
    <h1>Clearing cache and redirecting to homepage...</h1>
    <p>If not redirected automatically, <a href="/">click here</a>.</p>
</body>
</html>
